<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pendataan Warga & Bangunan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <style>
        /* Sedikit kustomisasi agar serasi dengan style.css milikmu */
        .dataTables_wrapper { margin-top: 15px; }
        .dataTables_filter { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aplikasi Pendataan Warga & Bangunan</h1>
        
        <div class="card">
            <h2>Tambah Data Baru</h2>
            <form id="dataForm">
                <input type="hidden" id="dataId">

                <div class="form-group">
                    <label for="noBangunan">Nomor Urut Bangunan:</label>
                    <input type="text" id="noBangunan" inputmode="numeric" pattern="[0-9]*" placeholder="Contoh: B-01 atau 001" required>
                </div>
                
                <div class="form-group">
                    <label for="noKeluarga">Nomor Urut Keluarga:</label>
                    <input type="text" id="noKeluarga" inputmode="numeric" pattern="[0-9]*" placeholder="Contoh: K-01 atau 001" required>
                </div>
                
                <div class="form-group">
                    <label for="namaKepala">Nama Kepala Keluarga / Penghuni:</label>
                    <input type="text" id="namaKepala" placeholder="Masukkan nama lengkap" required>
                </div>
                
                <div class="form-group" style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 100px;">
                        <label for="blokRumah">Blok Rumah:</label>
                        <input type="text" id="blokRumah" placeholder="Contoh: A atau 01" required>
                    </div>
                    <div style="flex: 1; min-width: 100px;">
                        <label for="noRumah">Nomor Rumah:</label>
                        <input type="text" id="noRumah" placeholder="Contoh: 12" required>
                    </div>
                    <div style="flex: 1; min-width: 80px;">
                        <label for="rtRumah">RT:</label>
                        <input type="text" id="rtRumah" inputmode="numeric" pattern="[0-9]*" placeholder="01" required>
                    </div>
                    <div style="flex: 1; min-width: 80px;">
                        <label for="rwRumah">RW:</label>
                        <input type="text" id="rwRumah" inputmode="numeric" pattern="[0-9]*" placeholder="03" required>
                    </div>
                </div>
                
                <button type="submit" id="btnSimpan">Simpan Data</button>
            </form>
        </div>

        <div class="card table-container">
    <h2>Daftar Urutan Data</h2>
<table id="tabelWarga" class="display nowrap" style="width:100%">
            <thead>
            <tr>
                <th>No. Bangunan</th>
                <th>No. Keluarga</th>
                <th>Nama</th>
                <th>Alamat Utama</th>
                <th style="text-align: center;">RT</th>
                <th style="text-align: center;">RW</th>
                <th class="no-sort">Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelBodi">
            </tbody>
        <tfoot>
            <tr>
                <th>No. Bangunan</th>
                <th>No. Keluarga</th>
                <th>Nama</th>
                <th>Alamat Utama</th>
                <th style="text-align: center;">RT</th>
                <th style="text-align: center;">RW</th>
                <th>Aksi</th>
            </tr>
        </tfoot>
    </table>
</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
